name: "buildwheels"

on:
  pull_request:
    paths:
      - "CMakeLists.txt"
      - "pyproject.toml"
      - "build_backend/**"
      - "src_patches_v623/**"
      - "scripts/**"
      - "itis_dakota/**"
      - "tests/**"
      - "Makefile"
      - ".github/workflows/buildwheels.yml"
  push:
    branches: [ master ]
  schedule:
    - cron: "5 0 * * 0"

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  tag:
    name: Tag new version
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_tag: ${{ steps.tag_version.outputs.new_tag }}
      changelog: ${{ steps.tag_version.outputs.changelog }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Extract custom version from commit message
        id: custom_version
        if: github.ref == 'refs/heads/master'
        run: |
          MSG=$(git log -1 --format=%B)
          if [[ "$MSG" =~ \#version:([0-9]+\.[0-9]+\.[0-9]+) ]]; then
            echo "tag=${BASH_REMATCH[1]}" >> $GITHUB_OUTPUT
          fi
      - name: Bump version and push tag
        id: tag_version
        if: github.ref == 'refs/heads/master'
        uses: anothrNick/github-tag-action@1.75.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WITH_V: false
          DEFAULT_BUMP: patch
          CUSTOM_TAG: ${{ steps.custom_version.outputs.tag }}

  wheels-linux:
    name: Build wheel on linux ${{ matrix.python }} ${{ matrix.arch }}
    runs-on: ${{ matrix.github-runner }}
    strategy:
      fail-fast: false
      matrix:
        python: [ "3.10", "3.11", "3.12", "3.13", "3.14" ]
        arch: [ "x86_64", "arm64" ]
        include:
          - arch: x86_64
            github-runner: "ubuntu-24.04"
            wheel-platform: "x86_64"
          - arch: arm64
            github-runner: "ubuntu-24.04-arm"
            wheel-platform: "aarch64"

    permissions:
      contents: write
    needs: tag
    steps:
      - name: Set cibuildwheel Python version
        run: |
          python_version="${{ matrix.python }}"
          cibw_python="cp${python_version/./}"
          echo "CIBW_PYTHON=$cibw_python" >> $GITHUB_ENV
      - uses: actions/checkout@v6
        if: github.ref != 'refs/heads/master'
        with:
          fetch-depth: 0
      - uses: actions/checkout@v6
        if: github.ref == 'refs/heads/master'
        with:
          fetch-depth: 0
          ref: ${{ needs.tag.outputs.new_tag }}
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
          cache: "pip"
      - name: Cache Dakota source
        uses: actions/cache@v5
        with:
          path: dakota
          key: dakota-src-v6.23.0-${{ hashFiles('src_patches_v623/*.patch') }}
      - name: Get dakota src
        run: |
          if [ ! -d dakota/.git ]; then
            make get-dakota-src
          fi
      - name: Configure sccache for cibuildwheel
        uses: mozilla-actions/sccache-action@v0.0.10
      - uses: pypa/cibuildwheel@v3.4.1
        env:
          CIBW_BUILD: ${{ env.CIBW_PYTHON }}-*
          CIBW_ARCHS: ${{ matrix.wheel-platform }}
          SCCACHE_GHA_ENABLED: "true"
          SCCACHE_GHA_CACHE_TO: sccache-linux-${{ matrix.arch }}
          SCCACHE_GHA_CACHE_FROM: sccache-linux-${{ matrix.arch }}
      - name: Run tests
        run: |
          pip install pytest
          pip install ./wheelhouse/itis_dakota*.whl
          pytest
      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-linux-${{ env.CIBW_PYTHON }}_${{ matrix.wheel-platform }}
          path: ./wheelhouse/*.whl

  wheels-macos:
    name: Build wheels on macos ${{ matrix.arch }}
    runs-on: ${{ matrix.github-runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            github-runner: "macos-15-intel"
            wheel-platform: "x86_64"
          - arch: arm64
            github-runner: "macos-14"
            wheel-platform: "arm64"

    permissions:
      contents: write
    needs: tag
    steps:
      - uses: actions/checkout@v6
        if: github.ref != 'refs/heads/master'
        with:
          fetch-depth: 0
      - uses: actions/checkout@v6
        if: github.ref == 'refs/heads/master'
        with:
          fetch-depth: 0
          ref: ${{ needs.tag.outputs.new_tag }}
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: "pip"
      - name: Cache Dakota source
        uses: actions/cache@v5
        with:
          path: dakota
          key: dakota-src-v6.23.0-${{ hashFiles('src_patches_v623/*.patch') }}
      - name: Get dakota src
        run: |
          if [ ! -d dakota/.git ]; then
            make get-dakota-src
          fi
      - name: Cache Homebrew packages
        uses: actions/cache@v5
        with:
          path: ~/Library/Caches/Homebrew/downloads
          key: brew-${{ matrix.arch }}-${{ hashFiles('Makefile') }}
          restore-keys: brew-${{ matrix.arch }}-
      - name: Install macOS build dependencies (Homebrew)
        run: make brew-deps
      - name: Set MACOSX_DEPLOYMENT_TARGET from runner
        # cibuildwheel's default (10.13/11.0) is older than the Homebrew
        # bottles installed on the runner, which makes delocate refuse to
        # bundle them. Pin to the runner's major macOS version.
        run: |
          MAC_MAJOR=$(sw_vers -productVersion | cut -d. -f1).0
          echo "MACOSX_DEPLOYMENT_TARGET=$MAC_MAJOR" >> "$GITHUB_ENV"
      - name: Configure sccache for cibuildwheel
        uses: mozilla-actions/sccache-action@v0.0.10
      # Build all 5 Python versions sequentially on this single runner.
      # sccache caches ~1200/1458 C++ objects across Python versions
      # (only ~260 Python-dependent files recompile each time).
      - uses: pypa/cibuildwheel@v3.4.1
        env:
          CIBW_BUILD: "cp310-* cp311-* cp312-* cp313-* cp314-*"
          CIBW_ARCHS: ${{ matrix.wheel-platform }}
          SCCACHE_GHA_ENABLED: "true"
          SCCACHE_GHA_CACHE_TO: sccache-macos-${{ matrix.arch }}
          SCCACHE_GHA_CACHE_FROM: sccache-macos-${{ matrix.arch }}
      - name: Run tests
        run: |
          pip install pytest
          pip install ./wheelhouse/itis_dakota*cp314*.whl
          pytest
      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-macos-${{ matrix.wheel-platform }}
          path: ./wheelhouse/*.whl

  test:
    name: Test wheel on ${{ matrix.os }} ${{ matrix.arch }}
    needs: [ wheels-linux, wheels-macos ]
    runs-on: ${{ matrix.github-runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: x86_64
            github-runner: "ubuntu-24.04"
            artifact: "wheels-linux-cp314_x86_64"
          - os: linux
            arch: arm64
            github-runner: "ubuntu-24.04-arm"
            artifact: "wheels-linux-cp314_aarch64"
          - os: macos
            arch: x86_64
            github-runner: "macos-15-intel"
            artifact: "wheels-macos-x86_64"
          - os: macos
            arch: arm64
            github-runner: "macos-14"
            artifact: "wheels-macos-arm64"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.artifact }}
          path: wheelhouse
      - name: Install wheel and run tests
        run: |
          pip install pytest
          pip install wheelhouse/*cp314*.whl
          pytest

  release:
    name: Create new github release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs:
      - tag
      - test
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.tag.outputs.new_tag }}
      - name: Create a GitHub release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ needs.tag.outputs.new_tag }}
          generateReleaseNotes: true
          artifacts: wheels-*

  test-pypi:
    name: Publish wheels on Test PyPI
    runs-on: ubuntu-latest
    needs:
      - release
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    environment:
      name: testpypi
      url: https://test.pypi.org/p/itis-dakota
    permissions:
      id-token: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true
      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  pypi:
    name: Publish wheels on PyPI
    runs-on: ubuntu-latest
    needs:
      - test-pypi
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    environment:
      name: pypi
      url: https://pypi.org/p/itis-dakota
    permissions:
      id-token: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true
      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
